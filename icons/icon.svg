<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a6b3e" />
      <stop offset="100%" stop-color="#224424" />
    </linearGradient>
    <linearGradient id="checkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#baf0b8" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.15" />
    </filter>
  </defs>
  <!-- Background Rounded Rect -->
  <rect width="480" height="480" rx="108" x="16" y="16" fill="url(#bgGrad)" filter="url(#shadow)" />
  
  <!-- Apartment Icon / Construction Tower -->
  <g transform="translate(110, 110)" fill="#ffffff" opacity="0.85">
    <rect x="20" y="80" width="100" height="180" rx="8" fill="none" stroke="#ffffff" stroke-width="16" />
    <rect x="140" y="40" width="110" height="220" rx="8" fill="none" stroke="#ffffff" stroke-width="16" stroke-dasharray="none" />
    
    <!-- Windows -->
    <rect x="45" y="110" width="16" height="16" rx="2" />
    <rect x="45" y="150" width="16" height="16" rx="2" />
    <rect x="45" y="190" width="16" height="16" rx="2" />
    
    <rect x="165" y="70" width="20" height="20" rx="3" />
    <rect x="205" y="70" width="20" height="20" rx="3" />
    
    <rect x="165" y="110" width="20" height="20" rx="3" />
    <rect x="205" y="110" width="20" height="20" rx="3" />
    
    <rect x="165" y="150" width="20" height="20" rx="3" />
    <rect x="205" y="150" width="20" height="20" rx="3" />
    
    <rect x="165" y="190" width="20" height="20" rx="3" />
    <rect x="205" y="190" width="20" height="20" rx="3" />
  </g>

  <!-- Large Quality Checkmark Badge -->
  <circle cx="360" cy="360" r="80" fill="url(#checkGrad)" filter="url(#shadow)" />
  <path d="M320 360 l25 25 l50 -50" fill="none" stroke="#3a6b3e" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" />
</svg>
